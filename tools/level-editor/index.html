
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono, monospace); font-size: 13px; background: transparent; color: var(--color-text-primary); }
.root { display: flex; height: 600px; }
.sidebar { width: 260px; min-width: 260px; border-right: 0.5px solid var(--color-border-tertiary); overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-section { padding: 10px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.sidebar-section h3 { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.level-btn { display: block; width: 100%; text-align: left; padding: 6px 8px; border-radius: 4px; border: none; background: transparent; cursor: pointer; color: var(--color-text-primary); font-family: var(--font-mono); font-size: 13px; }
.level-btn:hover { background: var(--color-background-secondary); }
.level-btn.active { background: var(--color-background-info); color: var(--color-text-info); font-weight: 500; }
.tool-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 7px; border-radius: 4px; border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; color: var(--color-text-primary); font-family: var(--font-mono); font-size: 12px; }
.tool-btn:hover { background: var(--color-background-secondary); }
.tool-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.tools-row { display: flex; flex-wrap: wrap; gap: 4px; }
.prop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.prop-label { font-size: 11px; color: var(--color-text-secondary); min-width: 64px; }
.prop-input { flex: 1; font-family: var(--font-mono); font-size: 12px; padding: 3px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: var(--color-background-primary); color: var(--color-text-primary); }
.sel-box { background: var(--color-background-secondary); border-radius: 6px; padding: 8px 10px; margin-top: 4px; }
.sel-box h4 { font-size: 11px; font-weight: 500; margin-bottom: 6px; color: var(--color-text-secondary); }
.delete-btn { margin-top: 6px; display: block; width: 100%; padding: 4px; border: 0.5px solid var(--color-border-danger,#f09595); border-radius: 4px; background: transparent; color: var(--color-text-danger,#e24b4a); cursor: pointer; font-size: 12px; font-family: var(--font-mono); }
.delete-btn:hover { background: var(--color-background-danger,#fcebeb); }
.canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.canvas-toolbar { padding: 6px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); }
.canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0a0a1a; }
canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
.json-panel { width: 240px; min-width: 240px; border-left: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; }
.json-panel h3 { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.json-out { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: var(--font-mono); font-size: 11px; white-space: pre; color: var(--color-text-secondary); line-height: 1.6; }
.json-btns { display: flex; gap: 6px; padding: 8px 12px; border-top: 0.5px solid var(--color-border-tertiary); }
.json-btn { flex: 1; padding: 6px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: transparent; color: var(--color-text-primary); cursor: pointer; font-family: var(--font-mono); font-size: 11px; }
.json-btn:hover { background: var(--color-background-secondary); }
.import-err { font-size: 11px; color: var(--color-text-danger,#e24b4a); padding: 0 12px 6px; display: none; }

.tile-picker { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 0; }
.tile-btn { width: 34px; height: 34px; border: 1.5px solid transparent; border-radius: 3px; cursor: pointer; background: rgba(255,255,255,0.06); overflow: hidden; padding: 0; position: relative; }
.tile-btn:hover { border-color: rgba(255,255,255,0.3); }
.tile-btn.active { border-color: #6af; box-shadow: 0 0 0 1px #6af; }
.tile-btn canvas { position: absolute; top: 0; left: 0; width: 34px; height: 34px; image-rendering: pixelated; }
</style>
</head>
<body>
<div class="root">
  <div class="sidebar" id="sidebar"></div>
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <span id="coord-display">x: — y: —</span>
      <span style="margin-left:auto;">click to place · drag to move · right-click to delete</span>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <div class="json-panel">
    <h3>json output</h3>
    <div class="json-out" id="jsonOut"></div>
    <div class="import-err" id="importErr"></div>
    <div class="json-btns">
      <button class="json-btn" id="copyBtn">copy</button>
      <button class="json-btn" id="importBtn">import file</button>
    </div>
    <input type="file" id="fileInput" accept=".json" style="display:none;">
  </div>
</div>

// ── Compact formatter ───────────────────────────────────────────────
function formatNum(n){ return typeof n!=='number'?String(n):Number.isInteger(n)?n+'.0':String(n); }
function compactJson(obj,indent=0){
  const pad='  '.repeat(indent), pad1='  '.repeat(indent+1);
  if(Array.isArray(obj)){
    if(!obj.length) return '[]';
    if(obj.every(v=>typeof v==='number')) return '['+obj.map(formatNum).join(', ')+']';
    if(obj.every(v=>Array.isArray(v)&&v.every(n=>typeof n==='number')))
      return '[\n'+obj.map(v=>pad1+'['+v.map(formatNum).join(', ')+']').join(',\n')+'\n'+pad+']';
    return '[\n'+obj.map(v=>pad1+compactJson(v,indent+1)).join(',\n')+'\n'+pad+']';
  }
  if(obj!==null&&typeof obj==='object'){
    const keys=Object.keys(obj); if(!keys.length) return '{}';
    return '{\n'+keys.map(k=>pad1+JSON.stringify(k)+': '+compactJson(obj[k],indent+1)).join(',\n')+'\n'+pad+'}';
  }
  return typeof obj==='string'?JSON.stringify(obj):formatNum(obj);
}

// ── Import — accepts exactly what this editor outputs ───────────────
function loadFromJson(parsed){
  // Restore BASE keys
  for(const k of Object.keys(BASE)){ if(parsed[k]) BASE[k]=parsed[k]; }
  // Everything not in LEVEL_SKIP that has objectLocations is a level
  const newLevels={};
  for(const [k,v] of Object.entries(parsed)){
    if(LEVEL_SKIP.has(k)) continue;
    if(!v||typeof v!=='object'||!v.objectLocations) continue;
    newLevels[k]=v;
  }
  if(!Object.keys(newLevels).length) throw new Error('no level data found');
  for(const lev of Object.values(newLevels)){
    if(!lev.floors) lev.floors={tile:128.0,friction:0.1,density:0.0,restitution:0.1,debug:'#5a8a3c',positions:[]};
    if(!lev.floors.positions) lev.floors.positions=[];
    if(!lev.goo) lev.goo={tile:128.0,friction:0.7,density:0.0,restitution:0.1,debug:'#5a8a3c',fatal:true,positions:[],orientations:[]};
    if(!lev.goo.positions) lev.goo.positions=[];
    if(!lev.goo.orientations) lev.goo.orientations=[];
    while(lev.goo.orientations.length<lev.goo.positions.length) lev.goo.orientations.push(0);
    if(!lev.tilemap) lev.tilemap=[];
    if(!lev.objectLocations.zukosprite) lev.objectLocations.zukosprite=[];
  }
  levels=newLevels;
  currentLevel=Object.keys(levels)[0];
  selected=null;
}

document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const errEl=document.getElementById('importErr');
  new Promise((res,rej)=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.onerror=rej; r.readAsText(file); })
    .then(text=>{ loadFromJson(JSON.parse(text)); errEl.style.display='none'; buildSidebar(); draw(); updateJson(); })
    .catch(err=>{ errEl.textContent='error: '+err.message; errEl.style.display='block'; });
  e.target.value='';
});

  (lev.goo?.positions||[]).forEach((pts,i)=>{const s=selected&&selected.type==='goo'&&selected.index===i;drawPoly(pts,s?'rgba(180,50,255,0.55)':'rgba(150,30,230,0.4)',s?'rgba(220,100,255,1)':'rgba(180,60,255,0.8)');
    const orient=(lev.goo.orientations||[])[i]||0;
    const bb=polyBounds(pts);const cx2=wx((bb.x0+bb.x1)/2),cy2=wy((bb.y0+bb.y1)/2);

    ctx.fillStyle=s?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.6)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('▼',0,4);
    ctx.restore();

  lev.walls.positions.forEach((pts,i)=>drawPoly(pts,selected&&selected.type==='wall'&&selected.index===i?'rgba(100,150,255,0.7)':'rgba(80,100,160,0.45)','rgba(140,160,255,0.9)'));
  lev.platforms.positions.forEach((pts,i)=>{const s=selected&&selected.type==='platform'&&selected.index===i;drawPoly(pts,s?'rgba(255,200,60,0.5)':'rgba(180,140,60,0.35)',s?'rgba(255,220,80,1)':'rgba(200,160,80,0.8)');});
  const ob=lev.objectLocations;
  ob.rock.forEach((p,i)=>drawObj(p[0],p[1],'🪨','#b0c0d0',selected&&selected.type==='rock'&&selected.index===i,0.6));
  ob.cloud.forEach((p,i)=>drawObj(p[0],p[1],'☁','#c0d8ff',selected&&selected.type==='cloud'&&selected.index===i,1.2));
  ob.ice.forEach((p,i)=>drawObj(p[0],p[1],'🧊','#80d8ff',selected&&selected.type==='ice'&&selected.index===i,0.6));
  (ob.zukosprite||[]).forEach((p,i)=>{
    const px=wx(p[0]),py=wy(p[1]),sz=SCALE*0.9,sel=selected&&selected.type==='zukosprite'&&selected.index===i;
    if(sel){ctx.beginPath();ctx.arc(px,py,sz/2+3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,100,0.25)';ctx.fill();ctx.strokeStyle='#ffe050';ctx.lineWidth=2;ctx.stroke();}
    ctx.imageSmoothingEnabled=false;
    if(zukoSpriteImg.complete&&zukoSpriteImg.naturalWidth) ctx.drawImage(zukoSpriteImg,px-sz/2,py-sz/2,sz,sz);
    else{ctx.font=`${Math.max(10,sz*0.8)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐸',px,py);}
  });

}
function drawPoly(pts,fill,stroke){ctx.beginPath();ctx.moveTo(wx(pts[0]),wy(pts[1]));for(let i=2;i<pts.length;i+=2)ctx.lineTo(wx(pts[i]),wy(pts[i+1]));ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
function drawObj(x,y,emoji,color,sel,r){const px=wx(x),py=wy(y),sr=r*SCALE;ctx.beginPath();ctx.arc(px,py,sr+2,0,Math.PI*2);ctx.fillStyle=sel?'rgba(255,255,100,0.25)':'rgba(255,255,255,0.08)';ctx.fill();ctx.strokeStyle=sel?'#ffe050':color;ctx.lineWidth=sel?2:1;ctx.stroke();ctx.font=`${Math.max(10,sr*1.2)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(emoji,px,py);}
function drawGoal(x,y,size,sel){const px=wx(x),py=wy(y),r=(size/2)*SCALE;ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=sel?'rgba(100,255,140,0.25)':'rgba(80,220,100,0.15)';ctx.fill();ctx.strokeStyle=sel?'#60ff90':'#40cc60';ctx.lineWidth=sel?2.5:1.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);ctx.font=`${Math.max(12,r*0.7)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',px,py);}
function drawZuko(x,y,size,sel){const px=wx(x),py=wy(y),r=(size/2)*SCALE;ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=sel?'rgba(255,230,80,0.3)':'rgba(255,200,50,0.12)';ctx.fill();ctx.strokeStyle=sel?'#ffe050':'#ffd030';ctx.lineWidth=sel?2.5:1.5;ctx.stroke();ctx.font=`${Math.max(12,r*0.8)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔥',px,py);}

// ── Hit test ────────────────────────────────────────────────────────
function hitTest(gX,gY){
  const ob=levels[currentLevel].objectLocations;
  if(Math.hypot(gX-ob.zuko.pos[0],gY-ob.zuko.pos[1])<ob.zuko.size/2+0.3) return {type:'zuko'};
  if(Math.hypot(gX-ob.goal.pos[0],gY-ob.goal.pos[1])<ob.goal.size/2+0.3) return {type:'goal'};
  for(const type of ['rock','cloud','ice','zukosprite']){const r=type==='cloud'?1.5:0.9;for(let i=(ob[type]||[]).length-1;i>=0;i--)if(Math.hypot(gX-ob[type][i][0],gY-ob[type][i][1])<r)return {type,index:i};}
  return null;
}
function polyHit(pts,x,y,m){const b=polyBounds(pts);return x>=b.x0-m&&x<=b.x1+m&&y>=b.y0-m&&y<=b.y1+m;}
function polyBounds(pts){let x0=pts[0],x1=pts[0],y0=pts[1],y1=pts[1];for(let i=0;i<pts.length;i+=2){x0=Math.min(x0,pts[i]);x1=Math.max(x1,pts[i]);}for(let i=1;i<pts.length;i+=2){y0=Math.min(y0,pts[i]);y1=Math.max(y1,pts[i]);}return {x0,x1,y0,y1};}

    for(let i=(lev.goo?.positions||[]).length-1;i>=0;i--){if(polyHit(lev.goo.positions[i],gX,gY,0.2)){lev.goo.positions.splice(i,1);lev.goo.orientations.splice(i,1);if(selected&&selected.type==='goo'&&selected.index===i)selected=null;buildSidebar();draw();updateJson();return;}}

  selected=null;buildSidebar();draw();updateJson();
});

    } else if(selected.type==='zuko'){
      box.innerHTML='<h4>zuko</h4>';
      [['pos x',()=>ob.zuko.pos[0],v=>{ob.zuko.pos[0]=v;}],['pos y',()=>ob.zuko.pos[1],v=>{ob.zuko.pos[1]=v;}],['size',()=>ob.zuko.size,v=>{ob.zuko.size=v;}],['force',()=>ob.zuko.force,v=>{ob.zuko.force=v;}],['maxspeed',()=>ob.zuko.maxspeed,v=>{ob.zuko.maxspeed=v;}],['jump_force',()=>ob.zuko.jump_force,v=>{ob.zuko.jump_force=v;}]].forEach(([label,get,set])=>{const row=document.createElement('div');row.className='prop-row';row.innerHTML=`<span class="prop-label">${label}</span>`;const inp=document.createElement('input');inp.className='prop-input';inp.type='number';inp.step='0.25';inp.value=get();inp.onchange=()=>{set(parseFloat(inp.value)||0);draw();updateJson();};row.appendChild(inp);box.appendChild(row);});
    } else if(selected.type==='goo'){
      const arr=lev.goo.positions[selected.index];
      box.innerHTML='<h4>goo '+selected.index+'</h4>';
      ['x1','y1','x2','y2','x3','y3','x4','y4'].slice(0,arr.length).forEach((lbl,i)=>{const row=document.createElement('div');row.className='prop-row';row.innerHTML=`<span class="prop-label">${lbl}</span>`;const inp=document.createElement('input');inp.className='prop-input';inp.type='number';inp.step='0.25';inp.value=arr[i];inp.onchange=()=>{arr[i]=parseFloat(inp.value)||0;draw();updateJson();};row.appendChild(inp);box.appendChild(row);});
      const oRow=document.createElement('div');oRow.className='prop-row';oRow.innerHTML='<span class="prop-label">orient</span>';
      const oSel=document.createElement('select');oSel.className='prop-input';
      [[0,'top'],[90,'right'],[-90,'left'],[180,'bottom']].forEach(([v,lbl2])=>{const o=document.createElement('option');o.value=v;o.textContent=lbl2;if((lev.goo.orientations[selected.index]||0)===v)o.selected=true;oSel.appendChild(o);});
      oSel.onchange=()=>{lev.goo.orientations[selected.index]=parseInt(oSel.value);draw();updateJson();};
      oRow.appendChild(oSel);box.appendChild(oRow);
      const db=document.createElement('button');db.className='delete-btn';db.textContent='delete goo';db.onclick=()=>{lev.goo.positions.splice(selected.index,1);lev.goo.orientations.splice(selected.index,1);selected=null;buildSidebar();draw();updateJson();};box.appendChild(db);
    } else if(['platform','wall','floor'].includes(selected.type)){
      const arr=selected.type==='platform'?lev.platforms.positions[selected.index]:selected.type==='floor'?lev.floors.positions[selected.index]:lev.walls.positions[selected.index];
      box.innerHTML=`<h4>${selected.type} ${selected.index}</h4>`;
      ['x1','y1','x2','y2','x3','y3','x4','y4'].slice(0,arr.length).forEach((lbl,i)=>{const row=document.createElement('div');row.className='prop-row';row.innerHTML=`<span class="prop-label">${lbl}</span>`;const inp=document.createElement('input');inp.className='prop-input';inp.type='number';inp.step='0.25';inp.value=arr[i];inp.onchange=()=>{arr[i]=parseFloat(inp.value)||0;draw();updateJson();};row.appendChild(inp);box.appendChild(row);});
      if(selected.type==='platform'||selected.type==='floor'){const db=document.createElement('button');db.className='delete-btn';db.textContent='delete '+selected.type;db.onclick=()=>{(selected.type==='floor'?lev.floors:lev.platforms).positions.splice(selected.index,1);selected=null;buildSidebar();draw();updateJson();};box.appendChild(db);}
    }
    ins.appendChild(box);sb.appendChild(ins);
  }
  const gs=document.createElement('div');gs.className='sidebar-section';gs.innerHTML='<h3>world physics</h3>';
  [['gravity',()=>BASE.world.gravity,v=>{BASE.world.gravity=v;}],['volume',()=>BASE.world.volume,v=>{BASE.world.volume=v;}]].forEach(([label,get,set])=>{const row=document.createElement('div');row.className='prop-row';row.innerHTML=`<span class="prop-label">${label}</span>`;const inp=document.createElement('input');inp.className='prop-input';inp.type='number';inp.step='0.1';inp.value=get();inp.onchange=()=>{set(parseFloat(inp.value));updateJson();};row.appendChild(inp);gs.appendChild(row);});
  sb.appendChild(gs);
}

document.getElementById('copyBtn').onclick=()=>{navigator.clipboard.writeText(document.getElementById('jsonOut').textContent).then(()=>{const b=document.getElementById('copyBtn');b.textContent='copied!';setTimeout(()=>b.textContent='copy',1500);});};

new ResizeObserver(resizeCanvas).observe(wrap);
buildSidebar(); updateJson();
</script>
</body>
</html>
